server {
    listen 80;
    server_name _;

    root /var/www/rag;
    index index.html;
    try_files $uri $uri/ /index.html;

    # El frontend usa VITE_API_BASE_URL=/api → las rutas FastAPI van como /api/health, /api/chat, etc.
    # Hay que quitar el prefijo /api al reenviar a uvicorn (las rutas en app.main no llevan /api).
    location /api/ {
        proxy_pass http://127.0.0.1:3333/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rutas FastAPI bajo /whatsapp/ (p. ej. allowlist) sin prefijo /api — útil para pruebas directas o clientes legacy.
    location /whatsapp/ {
        proxy_pass http://127.0.0.1:3333/whatsapp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}