# Nginx: front estático + API RAG + WhatsApp, detrás de Cloudflare (proxy naranja).
#
# Requisitos:
# - Cloudflare SSL/TLS → modo "Full (strict)" (recomendado): certificado válido en el origen.
# - Firewall GCP (o similar): TCP 80 y 443 abiertos hacia esta VM.
# - Let's Encrypt (certbot) para cosmo.codla.co (ver scripts/certbot-cosmo.example.sh).
#
# Instalación típica:
#   sudo mkdir -p /etc/nginx/snippets /var/www/certbot
#   sudo cp scripts/nginx-cloudflare-realip.conf /etc/nginx/snippets/
#   sudo cp scripts/nginx-rag.conf /etc/nginx/sites-available/rag
#   sudo ln -sf /etc/nginx/sites-available/rag /etc/nginx/sites-enabled/rag
#   # Tras obtener certificados (certbot), descomentar el bloque server :443 abajo.
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare → SSL/TLS → "Full (strict)" (certificado válido en el origen, p. ej. Let's Encrypt).
# Cloudflare envía X-Forwarded-Proto hacia el origen; el proxy lo reenvía al backend.

# --- HTTP: ACME + app (Cloudflare "Flexible" llega aquí; "Full strict" también usa :443) ---
server {
    listen 80;
    listen [::]:80;
    server_name cosmo.codla.co;

    include /etc/nginx/snippets/nginx-cloudflare-realip.conf;

    root /var/www/rag;
    index index.html;

    # Certbot / Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # /ingest puede tardar mucho (PDF enorme + embeddings). Sin esto, Nginx corta a ~60s y el cliente pierde conexión.
    location /api/ {
        client_max_body_size 200M;
        proxy_pass http://127.0.0.1:3333/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    location /whatsapp/ {
        proxy_pass http://127.0.0.1:3333/whatsapp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Opcional: forzar HTTPS en el origen cuando ya tengas :443 y certificado (modo Full/Strict).
    # Cuidado: no activar hasta que listen 443 funcione o perderás el tráfico HTTP de prueba.
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

