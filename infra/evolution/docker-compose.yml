# Evolution API + PostgreSQL + Redis (+ Manager opcional en :3001).
# Uso: cd infra/evolution && cp .env.example .env && docker compose up -d
#
# Manager en :8080: http://127.0.0.1:8080/manager/login (URL por defecto del formulario = API).
# Manager en :3001 (perfil standalone-manager): nginx reenvía las rutas de la API al servicio api;
# la URL por defecto http://127.0.0.1:3001 ya responde con el JSON de bienvenida en GET /.
#
# AUTHENTICATION_API_KEY en .env (sin comillas). Si queda vacío, Evolution usa BQYHJGJHJ por defecto.
# Tras cambiar la clave: docker compose up -d api --force-recreate
#
# Manager en contenedor aparte: docker compose --profile standalone-manager up -d
#
# El backend RAG en el host debe escuchar en el puerto 8000 y tener
# WEBHOOK_GLOBAL_URL apuntando a http://host.docker.internal:8000/webhooks/evolution
# (ya definido en .env.example de esta carpeta).

services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    profiles:
      - standalone-manager
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    volumes:
      # Imagen latest usa nginx que no acepta must-revalidate en gzip_proxied (bug upstream).
      - ./nginx-manager.conf:/etc/nginx/conf.d/nginx.conf:ro
    networks:
      - evolution-net

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
