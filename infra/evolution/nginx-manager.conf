# Manager en :3001 + reverse proxy hacia Evolution API (servicio Docker "api").
#
# El login usa por defecto http://127.0.0.1:3001 y hace GET / esperando JSON con "version".
# Sin proxy, nginx devolvía el HTML del SPA. /manager y /assets son estáticos; el resto → API.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream evolution_api_upstream {
    server api:8080;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # GET // (p. ej. serverUrl con "/" final). Redirect absoluto con puerto ($http_host incluye :3001).
    if ($request_uri ~ "^//+(.*)$") {
        return 302 http://$http_host/$1;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    location ^~ /assets/ {
        try_files $uri =404;
    }

    location = /manager {
        return 301 /manager/;
    }

    # Si "Server URL" incluye .../manager o .../manager/, verifyServer hace GET .../manager/ (HTML → Invalid server).
    # Con Accept: application/json (axios) devolvemos el JSON raíz de la API.
    location = /manager/ {
        if ($http_accept ~* application/json) {
            rewrite ^ /__evo_api_root__ last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /__evo_api_root__ {
        internal;
        proxy_pass http://evolution_api_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /manager/ {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location / {
        proxy_pass http://evolution_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
