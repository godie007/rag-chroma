name: Deploy to Jetson

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build frontend
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/frontend"
          if command -v npm >/dev/null 2>&1; then
            npm ci
            npm run build
          else
            echo "::warning::npm no encontrado; se usa frontend/dist del repositorio si existe"
            if [ ! -d dist ] || [ ! -f dist/index.html ]; then
              echo "ERROR: No hay dist y no se puede compilar. Instala Node.js/npm en el runner o incluye un build en el repo."
              exit 1
            fi
          fi
          test -f dist/index.html

      - name: Copy frontend build to Nginx document root
        run: |
          set -euo pipefail
          DIST="$GITHUB_WORKSPACE/frontend/dist"
          test -d "$DIST" && test -f "$DIST/index.html"
          sudo mkdir -p /var/www/rag
          sudo rm -rf /var/www/rag/*
          sudo cp -a "$DIST"/. /var/www/rag/
          sudo chown -R www-data:www-data /var/www/rag
          sudo find /var/www/rag -type f -exec chmod 644 {} \;
          sudo find /var/www/rag -type d -exec chmod 755 {} \;
          echo "Build desplegado en /var/www/rag ($(find /var/www/rag -type f | wc -l) archivos)"

      - name: Deploy Backend
        run: |
          mkdir -p /home/jetson/workspace/codla
          rm -rf /home/jetson/workspace/codla/backend
          cp -r "$GITHUB_WORKSPACE/backend" /home/jetson/workspace/codla/
          cd /home/jetson/workspace/codla/backend
          rm -rf chroma_db
          if [ ! -f .env ]; then 
            cp .env.example .env
            echo "OPENAI_API_KEY=sk-dummy" >> .env
          fi

      - name: Clean old services
        run: |
          sudo systemctl stop codla-frontend 2>/dev/null || true
          sudo systemctl stop codla-backend 2>/dev/null || true
          sudo systemctl disable codla-frontend 2>/dev/null || true
          sudo systemctl disable codla-backend 2>/dev/null || true
          sudo rm -f /etc/systemd/system/codla-* 2>/dev/null || true
          sudo systemctl daemon-reload 2>/dev/null || true
          echo "Old services cleaned"

      - name: Configure Nginx
        run: |
          echo "Configuring nginx..."
          cp "$GITHUB_WORKSPACE/scripts/nginx-rag.conf" /tmp/nginx-rag.conf
          sudo cp /tmp/nginx-rag.conf /etc/nginx/sites-available/rag
          sudo ln -sf /etc/nginx/sites-available/rag /etc/nginx/sites-enabled/rag
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo nginx -s reload 2>/dev/null || echo "nginx reload skipped"
          echo "Done"

      - name: Start Backend (simple)
        run: |
          cp "$GITHUB_WORKSPACE/scripts/simple-backend.py" /tmp/
          pkill -f simple-backend 2>/dev/null || true
          sleep 1
          python3 /tmp/simple-backend.py > /tmp/backend.log 2>&1 &
          sleep 3
          curl -s http://127.0.0.1:3333/health