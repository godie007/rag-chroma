name: Deploy to Jetson

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop existing services
        run: |
          sudo systemctl stop rag-backend || true
          sudo systemctl stop rag-frontend || true
          sudo pkill -f "uvicorn app.main:app" || true
          sudo pkill -f "vite" || true

      - name: Deploy Backend
        run: |
          mkdir -p /home/jetson/workspace/codla
          rm -rf /home/jetson/workspace/codla/backend
          cp -r $GITHUB_WORKSPACE/backend /home/jetson/workspace/codla/
          cd /home/jetson/workspace/codla/backend
          rm -rf chroma_db
          if [ ! -f .env ]; then cp .env.example .env; fi
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools wheel
          .venv/bin/pip install --no-cache-dir uvicorn fastapi pydantic pydantic-settings python-dotenv python-multipart
          .venv/bin/pip install --no-cache-dir httpx requests charset-normalizer certifi idna urllib3 sniffio
          .venv/bin/pip install --no-cache-dir numpy
          .venv/bin/pip install --no-cache-dir openai==1.12.0 tiktoken
          .venv/bin/pip install --no-cache-dir langchain-core langchain-text-splitters langchain-openai
          .venv/bin/pip install --no-cache-dir pypdf PyMuPDF
          .venv/bin/pip install --no-cache-dir --no-deps chromadb langchain-chroma langchain-community
          # Opcional: ragas solo si se necesita evaluación (muy pesado, ~500MB extra)
          # .venv/bin/pip install --no-cache-dir ragas
          cp $GITHUB_WORKSPACE/scripts/start-backend.sh /home/jetson/workspace/codla/backend/
          chmod +x /home/jetson/workspace/codla/backend/start-backend.sh

      - name: Deploy Frontend (Production Build)
        run: |
          mkdir -p /home/jetson/workspace/codla
          rm -rf /home/jetson/workspace/codla/frontend
          cp -r $GITHUB_WORKSPACE/frontend /home/jetson/workspace/codla/
          cd /home/jetson/workspace/codla/frontend
          if [ ! -f .env ]; then cp .env.example .env; fi
          # Usar vite preview para evitar build con typescript incompatible en Jetson
          npm install
          PORT=4444 nohup npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2 &

      - name: Configure Nginx
        run: |
          sudo cp $GITHUB_WORKSPACE/scripts/nginx-rag.conf /etc/nginx/sites-available/rag
          sudo cp /etc/nginx/sites-available/rag /etc/nginx/sites-enabled/rag
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl restart nginx

      - name: Start Backend Service
        run: |
          cd /home/jetson/workspace/codla/backend
          nohup /home/jetson/workspace/codla/backend/start-backend.sh > /tmp/rag-backend.log 2>&1 &
          sleep 3
          curl -s http://127.0.0.1:3333/health || echo "Backend not responding yet"