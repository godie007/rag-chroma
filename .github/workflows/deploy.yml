name: Deploy to Jetson

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stop existing services
        run: |
          sudo systemctl stop rag-backend || true
          sudo systemctl stop rag-frontend || true

      - name: Deploy Backend
        run: |
          mkdir -p /home/jetson/workspace/codla
          rm -rf /home/jetson/workspace/codla/backend
          cp -r $GITHUB_WORKSPACE/backend /home/jetson/workspace/codla/
          cd /home/jetson/workspace/codla/backend
          rm -rf chroma_db
          cp .env.example .env
          pip3 install --upgrade pip setuptools wheel
          pip3 install --no-cache-dir uvicorn fastapi pydantic pydantic-settings python-dotenv python-multipart || true
          pip3 install --no-cache-dir httpx requests charset-normalizer certifi idna urllib3 sniffio || true
          pip3 install --no-cache-dir numpy || true
          pip3 install --no-cache-dir openai==1.12.0 tiktoken || true
          pip3 install --no-cache-dir langchain-core langchain-text-splitters langchain-openai || true
          pip3 install --no-cache-dir pypdf PyMuPDF || true
          pip3 install --no-cache-dir --no-deps chromadb langchain-chroma langchain-community || true
          sudo cp rag-backend.service /etc/systemd/system/
          sudo systemctl daemon-reload || true
          sudo systemctl enable rag-backend || true
          sudo systemctl restart rag-backend || true

      - name: Deploy Frontend
        run: |
          mkdir -p /home/jetson/workspace/codla
          rm -rf /home/jetson/workspace/codla/frontend
          cp -r $GITHUB_WORKSPACE/frontend /home/jetson/workspace/codla/
          cd /home/jetson/workspace/codla/frontend
          cp .env.example .env
          npm install || true
          sudo cp rag-frontend.service /etc/systemd/system/
          sudo systemctl daemon-reload || true
          sudo systemctl enable rag-frontend || true
          sudo systemctl restart rag-frontend || true
